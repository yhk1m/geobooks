<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoShelf</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
        </svg>
        <span class="logo-text">GeoShelf</span>
      </a>
      <nav class="nav">
        <a href="register.html" class="nav-link">도서 등록</a>
        <a href="admin.html" class="nav-link nav-link--admin">관리자</a>
        <div class="visitor-stats">
          <span class="stat">Today <strong id="todayCount">0</strong></span>
          <span class="stat-divider">|</span>
          <span class="stat">Total <strong id="totalCount">0</strong></span>
        </div>
      </nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="register.html" class="mobile-nav-link">도서 등록</a>
      <a href="admin.html" class="mobile-nav-link">관리자</a>
    </div>
  </header>

  <!-- Hero / Search -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-title">지리 도서를 한눈에</h1>
      <p class="hero-desc">수준별, 내용별로 지리 관련 도서를 검색하고 찾아보세요.</p>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#999" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="도서명, 저자, 출판사, ISBN 검색..." class="search-input">
      </div>
    </div>
  </section>

  <!-- Filters -->
  <section class="filter-section">
    <div class="container">
      <div class="filter-group filter-group--level-row">
        <div class="filter-group__left">
          <span class="filter-label">수준별</span>
          <div class="filter-chips" id="levelFilters">
            <button class="chip active" data-value="all">전체</button>
            <button class="chip" data-value="유·초등">유·초등</button>
            <button class="chip" data-value="중등">중등</button>
            <button class="chip" data-value="대학/임용">대학/임용</button>
            <button class="chip" data-value="교양">교양</button>
            <button class="chip chip-new" data-value="new" id="newBookFilter">N 신간</button>
          </div>
        </div>
        <div class="filter-group__right" id="projectFilterGroup" style="display:none;">
          <span class="filter-label">지정도서목록</span>
          <select class="project-select" id="projectFilter">
            <option value="all">전체 도서</option>
          </select>
        </div>
      </div>
      <div class="filter-group filter-group--content">
        <span class="filter-label">내용별</span>
        <div class="filter-chips-wrap">
          <div class="filter-chips" id="contentFilters">
            <button class="chip active" data-value="all">전체</button>
            <button class="chip chip-parent" data-value="자연지리" data-children="기후,지형">자연지리</button>
            <button class="chip chip-parent" data-value="인문지리" data-children="문화,역사,도시,촌락,인구,경제,정치">인문지리</button>
            <button class="chip" data-value="교육">교육</button>
            <button class="chip" data-value="지도·GIS">지도·GIS</button>
            <button class="chip" data-value="지역">지역</button>
            <button class="chip" data-value="사상">사상</button>
            <button class="chip" data-value="기타">기타</button>
          </div>
          <div class="filter-sub-chips" id="contentSubFilters" style="display:none;"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Results -->
  <section class="results-section">
    <div class="container">
      <div class="results-header">
        <span class="result-count"><strong id="resultCount">0</strong>권의 도서</span>
        <div class="page-size-wrap">
          <select id="pageSize" class="page-size-select">
            <option value="10">10개씩</option>
            <option value="20" selected>20개씩</option>
            <option value="50">50개씩</option>
          </select>
        </div>
      </div>
      <div class="book-grid" id="bookGrid"></div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>도서를 불러오는 중...</p>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#ccc" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <p>검색 결과가 없습니다.</p>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>

  <!-- Book Detail Modal -->
  <div class="modal-overlay" id="bookModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="copyright">&copy; 2026 GeoShelf · 양정고등학교 지리교사 김용현 | bgnlkim@gmail.com</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
